# Okta Spring Boot Starter configuration.
# Source pattern: developer.okta.com/docs/guides/sign-into-web-app-redirect/spring-boot/main/
# Dependency: com.okta.spring:okta-spring-boot-starter

okta.oauth2.issuer=${OKTA_OAUTH2_ISSUER}
okta.oauth2.client-id=${OKTA_OAUTH2_CLIENT_ID}
okta.oauth2.client-secret=${OKTA_OAUTH2_CLIENT_SECRET}
# Default redirect URI: /login/oauth2/code/okta — register
# http://localhost:8080/login/oauth2/code/okta on the Okta app.
okta.oauth2.post-logout-redirect-uri=http://localhost:8080/
